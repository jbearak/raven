name: Release Build

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

concurrency:
  group: release-build-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  # Compatibility gate: confirm the raven we're about to release can open and
  # validate the current `names-db` Release asset — the database users download
  # with `raven packages update`. names.db is NOT bundled into the release; this
  # only guards against shipping a raven whose names.db format support has drifted
  # from the live database.
  names-db-compat:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Download the current names-db Release asset
        run: |
          mkdir -p dist
          gh release download names-db --repo "$GITHUB_REPOSITORY" \
            --pattern 'names.db' --dir dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build raven (release)
        run: cargo build --release -p raven

      - name: Validate names.db with the release raven
        run: ./target/release/raven packages validate-shipped-db dist/names.db

  build-lsp:
    needs: names-db-compat
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      id-token: write
      attestations: write
    defaults:
      run:
        shell: bash
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            platform: linux-x64
            use-zigbuild: true
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            platform: linux-arm64
            use-zigbuild: true
          - os: macos-latest
            target: aarch64-apple-darwin
            platform: macos-arm64
            use-zigbuild: false
          - os: macos-15-intel
            target: x86_64-apple-darwin
            platform: macos-x64
            use-zigbuild: false
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            platform: windows-x64
            use-zigbuild: false
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            platform: windows-arm64
            use-zigbuild: false

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      # Install the toolchain the way the integration.yml gates do: with NO
      # toolchain action, so rustup auto-installs rust-toolchain.toml's channel
      # and its components (rustfmt, clippy) in a single clean pass on first use.
      #
      # Using dtolnay/rust-toolchain here pre-installed rustfmt for 1.96.0; the
      # first `cargo` call in "Build LSP" then reconciled against
      # rust-toolchain.toml and tried to re-add rustfmt as the manifest's
      # `rustfmt-preview`, colliding with the `bin/cargo-fmt` already on disk
      # ("detected conflict: 'bin/cargo-fmt'") — a double-install the always-green
      # gates never hit because they have no toolchain step. `rustup target add`
      # both triggers that clean auto-install and adds the per-matrix
      # cross-compile target's std (what dtolnay's `targets:` used to do).
      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Cache cargo registry & build artifacts
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: release-cargo-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            release-cargo-${{ matrix.target }}-

      - name: Install cargo-zigbuild
        if: matrix.use-zigbuild
        run: pip install cargo-zigbuild==0.21.6

      - name: Build LSP
        run: |
          if [ "${{ matrix.use-zigbuild }}" = "true" ]; then
            cargo zigbuild --release --target ${{ matrix.target }} --bin raven
          else
            cargo build --release --target ${{ matrix.target }} --bin raven
          fi

      - name: Create archive
        run: |
          mkdir -p dist
          if [[ "${{ matrix.platform }}" == *"windows"* ]]; then
            cp target/${{ matrix.target }}/release/raven.exe dist/
            cp LICENSE dist/
            cd dist && 7z a -tzip ../raven-${{ matrix.platform }}.zip .
          else
            cp target/${{ matrix.target }}/release/raven dist/
            cp LICENSE dist/
            cd dist && zip -r ../raven-${{ matrix.platform }}.zip .
          fi

      - name: Attest build provenance (LSP archive)
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: raven-${{ matrix.platform }}.zip

      - name: Upload LSP artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: lsp-${{ matrix.platform }}
          path: raven-${{ matrix.platform }}.zip
          retention-days: 30

  build-vscode:
    needs: build-lsp
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    strategy:
      matrix:
        target: [darwin-arm64, darwin-x64, linux-x64, linux-arm64, win32-x64, win32-arm64]

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: '24'

      - name: Install Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Install vsce
        run: npm install -g @vscode/vsce@3.7.1

      - name: Download LSP artifacts
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          pattern: lsp-*
          path: lsp-binaries

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Update package.json version
        run: |
          cd editors/vscode
          npm version ${{ steps.version.outputs.version }} --no-git-tag-version --allow-same-version

      - name: Install dependencies
        run: |
          cd editors/vscode
          npm ci

      - name: Compile extension
        run: |
          cd editors/vscode
          npx esbuild src/extension.ts --bundle --platform=node --outfile=dist/extension.js --external:vscode --minify

      - name: Copy LSP binary
        run: |
          cd editors/vscode
          mkdir -p bin
          case "${{ matrix.target }}" in
            darwin-arm64) cp ../../lsp-binaries/lsp-macos-arm64/raven-macos-arm64.zip bin/ && cd bin && unzip raven-macos-arm64.zip && rm -f raven-macos-arm64.zip ;;
            darwin-x64) cp ../../lsp-binaries/lsp-macos-x64/raven-macos-x64.zip bin/ && cd bin && unzip raven-macos-x64.zip && rm -f raven-macos-x64.zip ;;
            linux-x64) cp ../../lsp-binaries/lsp-linux-x64/raven-linux-x64.zip bin/ && cd bin && unzip raven-linux-x64.zip && rm -f raven-linux-x64.zip ;;
            linux-arm64) cp ../../lsp-binaries/lsp-linux-arm64/raven-linux-arm64.zip bin/ && cd bin && unzip raven-linux-arm64.zip && rm -f raven-linux-arm64.zip ;;
            win32-x64) cp ../../lsp-binaries/lsp-windows-x64/raven-windows-x64.zip bin/ && cd bin && unzip raven-windows-x64.zip && rm -f raven-windows-x64.zip ;;
            win32-arm64) cp ../../lsp-binaries/lsp-windows-arm64/raven-windows-arm64.zip bin/ && cd bin && unzip raven-windows-arm64.zip && rm -f raven-windows-arm64.zip ;;
            *) echo "ERROR: Unknown target '${{ matrix.target }}'" && exit 1 ;;
          esac

      - name: Package extension
        run: |
          cd editors/vscode
          vsce package --target ${{ matrix.target }}

      - name: Attest build provenance (VSIX)
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: editors/vscode/*.vsix

      - name: Upload extension artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: vscode-${{ matrix.target }}
          path: editors/vscode/*.vsix
          retention-days: 30

  # ── Publish (gated by GitHub Environment approval) ──────────────────
  # After builds complete, these jobs appear as "Waiting for review" in
  # the Actions UI. Approve the "release" environment to create a GitHub
  # Release; approve "marketplace" to publish to VS Code Marketplace and
  # Open VSX.
  #
  # Setup (one-time): Go to repo Settings > Environments and create:
  #   1. "release"      – add yourself as a required reviewer
  #   2. "marketplace"  – add yourself as a required reviewer

  github-release:
    needs: [build-lsp, build-vscode]
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
    steps:
      - name: Download LSP artifacts
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          pattern: lsp-*
          path: lsp-artifacts
          merge-multiple: true

      - name: Download VSIX artifacts
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          pattern: vscode-*
          path: vscode-artifacts
          merge-multiple: true

      - name: List release files
        run: |
          echo "=== LSP binaries ==="
          find lsp-artifacts -type f | sort
          echo "=== VSIX packages ==="
          find vscode-artifacts -type f | sort

      - name: Generate SHA-256 checksums
        run: |
          echo "=== Generating SHA-256 checksums ==="
          for f in $(find lsp-artifacts -name '*.zip' | sort) $(find vscode-artifacts -name '*.vsix' | sort); do
            (cd "$(dirname "$f")" && sha256sum "$(basename "$f")" > "$(basename "$f").sha256")
            cat "$f.sha256"
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          files: |
            lsp-artifacts/**/*.zip
            lsp-artifacts/**/*.zip.sha256
            vscode-artifacts/**/*.vsix
            vscode-artifacts/**/*.vsix.sha256
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-marketplace:
    needs: github-release
    runs-on: ubuntu-latest
    environment: marketplace
    permissions: {}
    steps:
      - name: Download VSIX artifacts
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          pattern: vscode-*
          path: vscode-artifacts
          merge-multiple: true

      - name: Install vsce and ovsx
        run: npm install -g @vscode/vsce@3.7.1 ovsx@0.10.9

      - name: Publish to VS Code Marketplace
        run: |
          for vsix in $(find vscode-artifacts -name '*.vsix' | sort); do
            echo "Publishing $vsix to VS Code Marketplace..."
            vsce publish --packagePath "$vsix"
          done
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Publish to Open VSX
        continue-on-error: true
        run: |
          for vsix in $(find vscode-artifacts -name '*.vsix' | sort); do
            echo "Publishing $vsix to Open VSX..."
            ovsx publish "$vsix"
          done
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}

  # Smoke-test that the release just published above installs through the public
  # setup-raven action on every supported OS. Runs after github-release, so it is
  # informational and does not gate marketplace publishing. `@v1` is intentionally
  # a floating tag here (unlike the SHA-pinned actions elsewhere): the point is to
  # verify the exact ref users consume still installs this release.
  verify-install:
    name: Verify install via setup-raven on ${{ matrix.os }}
    needs: github-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: jbearak/setup-raven@v1
        with:
          version: ${{ github.ref_name }}
      - run: raven --version

  # ── apt repository bump ─────────────────────────────────────────────
  # After the GitHub Release is published, build Debian packages from the
  # already-built Linux release artifacts and open a PR against the static apt
  # repository (jbearak/apt-raven). That sibling repo is served by GitHub Pages
  # as an apt repository; the PR lets its own CI validate the repository indexes
  # and signatures before users can see the update.
  #
  # Setup (one-time), then this job activates itself:
  #   gh secret   set APT_REPO_TOKEN            -R jbearak/raven   # paste token
  #   gh secret   set APT_REPO_GPG_PRIVATE_KEY  -R jbearak/raven   # armored private key
  #   gh secret   set APT_REPO_GPG_PASSPHRASE   -R jbearak/raven   # optional, may be empty
  #   gh variable set ENABLE_APT_BUMP -R jbearak/raven --body true
  # APT_REPO_TOKEN: a GitHub App installation token or fine-grained PAT scoped
  # to jbearak/apt-raven with Contents:write + Pull requests:write.
  bump-apt:
    needs: github-release
    if: vars.ENABLE_APT_BUMP == 'true' && !contains(github.ref_name, '-')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false

      - name: Install Debian packaging tools
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends dpkg-dev gnupg unzip

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Download Linux x64 LSP artifact
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          pattern: lsp-linux-x64
          path: lsp-amd64
          merge-multiple: true

      - name: Download Linux arm64 LSP artifact
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          pattern: lsp-linux-arm64
          path: lsp-arm64
          merge-multiple: true

      - name: Build Debian packages
        run: |
          mkdir -p deb-input/amd64 deb-input/arm64 deb-dist
          unzip -q lsp-amd64/raven-linux-x64.zip -d deb-input/amd64
          unzip -q lsp-arm64/raven-linux-arm64.zip -d deb-input/arm64
          scripts/debian/build-deb.sh "${{ steps.version.outputs.version }}" amd64 deb-input/amd64/raven deb-dist
          scripts/debian/build-deb.sh "${{ steps.version.outputs.version }}" arm64 deb-input/arm64/raven deb-dist
          dpkg-deb --info "deb-dist/raven_${{ steps.version.outputs.version }}-1_amd64.deb"
          dpkg-deb --info "deb-dist/raven_${{ steps.version.outputs.version }}-1_arm64.deb"

      - name: Checkout apt repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          repository: jbearak/apt-raven
          persist-credentials: false
          path: apt-repo

      - name: Update apt repository
        env:
          APT_REPO_GPG_PRIVATE_KEY: ${{ secrets.APT_REPO_GPG_PRIVATE_KEY }}
          APT_REPO_GPG_PASSPHRASE: ${{ secrets.APT_REPO_GPG_PASSPHRASE }}
        run: |
          if [ -z "${APT_REPO_GPG_PRIVATE_KEY:-}" ]; then
            echo "::error::APT_REPO_GPG_PRIVATE_KEY is required when ENABLE_APT_BUMP is true" >&2
            exit 1
          fi
          export GNUPGHOME="$RUNNER_TEMP/apt-gnupg"
          mkdir -p "$GNUPGHOME"
          chmod 700 "$GNUPGHOME"
          printf '%s' "$APT_REPO_GPG_PRIVATE_KEY" | gpg --batch --import
          FINGERPRINT="$(gpg --batch --list-secret-keys --with-colons | awk -F: '/^fpr:/ { print $10; exit }')"
          if [ -z "$FINGERPRINT" ]; then
            echo "::error::could not find imported apt repository signing key fingerprint" >&2
            exit 1
          fi
          gpg --batch --yes --output apt-repo/raven-archive-keyring.gpg --export "$FINGERPRINT"
          APT_GPG_KEY_FINGERPRINT="$FINGERPRINT" \
          APT_GPG_PASSPHRASE="$APT_REPO_GPG_PASSPHRASE" \
            scripts/debian/update-apt-repo.sh \
              apt-repo \
              "${{ steps.version.outputs.version }}" \
              "deb-dist/raven_${{ steps.version.outputs.version }}-1_amd64.deb" \
              "deb-dist/raven_${{ steps.version.outputs.version }}-1_arm64.deb"

      - name: Open apt repository bump PR
        working-directory: apt-repo
        env:
          GH_TOKEN: ${{ secrets.APT_REPO_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "::error::APT_REPO_TOKEN is required when ENABLE_APT_BUMP is true" >&2
            exit 1
          fi
          if git diff --quiet; then
            echo "apt repository already contains Raven $VERSION — nothing to do."
            exit 0
          fi
          BRANCH="bump-raven-$VERSION"
          git config user.name "raven-release-bot"
          git config user.email "raven-release-bot@users.noreply.github.com"
          git checkout -B "$BRANCH"
          git add .
          git commit -m "raven $VERSION"
          AUTH_HEADER="AUTHORIZATION: basic $(printf 'x-access-token:%s' "$GH_TOKEN" | base64 | tr -d '\n')"
          git -c http.extraheader="$AUTH_HEADER" push --force origin "HEAD:$BRANCH"
          if ! gh pr create --base main --head "$BRANCH" \
                --title "raven $VERSION" \
                --body "Automated apt repository bump for [raven $VERSION](https://github.com/jbearak/raven/releases/tag/v$VERSION)."; then
            if gh pr view "$BRANCH" --json url >/dev/null 2>&1; then
              echo "PR for $BRANCH already exists; the force-push updated it."
            else
              echo "::error::gh pr create failed for $BRANCH" >&2
              exit 1
            fi
          fi
          gh pr merge "$BRANCH" --auto --squash \
            || echo "::warning::could not enable auto-merge; merge $BRANCH manually."

  # ── Homebrew tap bump ───────────────────────────────────────────────
  # After the GitHub Release is published, open a PR against the Homebrew
  # tap (jbearak/homebrew-raven) bumping the formula to this version with the
  # Apple Silicon checksum recomputed from the in-workflow release artifact (no
  # dependence on release-CDN propagation). The tap's own CI (brew audit /
  # install / test) gates that PR before it can merge, so a broken formula
  # never reaches users. The formula edit lives in the tap repo
  # (bin/update-formula.sh) — single source of truth shared with the tap's
  # bootstrap script.
  #
  # Setup (one-time), then this job activates itself:
  #   gh secret   set HOMEBREW_TAP_TOKEN   -R jbearak/raven   # paste token
  #   gh variable set ENABLE_HOMEBREW_BUMP -R jbearak/raven --body true
  # HOMEBREW_TAP_TOKEN: a GitHub App installation token or fine-grained PAT
  # scoped to jbearak/homebrew-raven with Contents:write + Pull requests:write.
  # The `if` guard keeps this job from failing on releases cut before setup.
  bump-homebrew:
    needs: github-release
    if: vars.ENABLE_HOMEBREW_BUMP == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Download macOS arm64 LSP artifact
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          pattern: lsp-macos-arm64
          path: lsp
          merge-multiple: true

      - name: Checkout Homebrew tap
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          repository: jbearak/homebrew-raven
          # Public repo: no token needed to clone, and persist-credentials:false
          # keeps any credential out of tap/.git/config. The tap PAT is supplied
          # only at push time (below), never persisted to disk.
          persist-credentials: false
          path: tap

      - name: Bump formula
        run: |
          tap/bin/update-formula.sh "${{ steps.version.outputs.version }}" \
            lsp/raven-macos-arm64.zip

      - name: Open bump PR
        working-directory: tap
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          if git diff --quiet; then
            echo "Formula already at $VERSION — nothing to do."
            exit 0
          fi
          BRANCH="bump-raven-$VERSION"
          git config user.name "raven-release-bot"
          git config user.email "raven-release-bot@users.noreply.github.com"
          # Only this job ever writes bump-raven-*, so reset the branch from
          # HEAD and force-push. No remote-tracking ref / pre-fetch needed, so
          # reruns can't fail on a stale lease.
          git checkout -B "$BRANCH"
          git add Formula/raven.rb
          git commit -m "raven $VERSION"
          # Authenticate the push with the tap token only here, via an HTTPS
          # basic-auth header (the actions/checkout mechanism). The token is
          # never written to .git/config.
          AUTH_HEADER="AUTHORIZATION: basic $(printf 'x-access-token:%s' "$GH_TOKEN" | base64 | tr -d '\n')"
          git -c http.extraheader="$AUTH_HEADER" push --force origin "HEAD:$BRANCH"
          # Create the PR. Tolerate ONLY the "PR already exists" case (rerun);
          # let auth/permission/API errors fail the job.
          if ! gh pr create --base main --head "$BRANCH" \
                --title "raven $VERSION" \
                --body "Automated formula bump for [raven $VERSION](https://github.com/jbearak/raven/releases/tag/v$VERSION). Checksum recomputed from the release artifact."; then
            if gh pr view "$BRANCH" --json url >/dev/null 2>&1; then
              echo "PR for $BRANCH already exists; the force-push updated it."
            else
              echo "::error::gh pr create failed for $BRANCH" >&2
              exit 1
            fi
          fi
          # Auto-merge once the tap's required `test` check passes (branch
          # protection makes it wait rather than merge immediately).
          gh pr merge "$BRANCH" --auto --squash \
            || echo "::warning::could not enable auto-merge; merge $BRANCH manually."
