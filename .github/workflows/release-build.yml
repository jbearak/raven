name: Release Build

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

concurrency:
  group: release-build-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  build-lsp:
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            platform: linux-x64
            use-zigbuild: true
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            platform: linux-arm64
            use-zigbuild: true
          - os: macos-latest
            target: aarch64-apple-darwin
            platform: macos-arm64
            use-zigbuild: false
          - os: macos-15-intel
            target: x86_64-apple-darwin
            platform: macos-x64
            use-zigbuild: false
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            platform: windows-x64
            use-zigbuild: false
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            platform: windows-arm64
            use-zigbuild: false

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Install Rust
        uses: dtolnay/rust-toolchain@f7ccc83f9ed1e5b9c81d8a67d7ad1a747e22a561 # stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Cache cargo registry & build artifacts
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: release-cargo-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            release-cargo-${{ matrix.target }}-

      - name: Install cargo-zigbuild
        if: matrix.use-zigbuild
        run: pip install cargo-zigbuild==0.21.6

      - name: Build LSP
        run: |
          if [ "${{ matrix.use-zigbuild }}" = "true" ]; then
            cargo zigbuild --release --target ${{ matrix.target }} --bin raven
          else
            cargo build --release --target ${{ matrix.target }} --bin raven
          fi

      - name: Create archive
        run: |
          mkdir -p dist
          if [[ "${{ matrix.platform }}" == *"windows"* ]]; then
            cp target/${{ matrix.target }}/release/raven.exe dist/
            cp LICENSE dist/
            cd dist && 7z a -tzip ../raven-${{ matrix.platform }}.zip .
          else
            cp target/${{ matrix.target }}/release/raven dist/
            cp LICENSE dist/
            cd dist && zip -r ../raven-${{ matrix.platform }}.zip .
          fi

      - name: Upload LSP artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: lsp-${{ matrix.platform }}
          path: raven-${{ matrix.platform }}.zip
          retention-days: 30

  build-vscode:
    needs: build-lsp
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [darwin-arm64, darwin-x64, linux-x64, linux-arm64, win32-x64, win32-arm64]

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: '24'

      - name: Install Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Install vsce
        run: npm install -g @vscode/vsce@3.7.1

      - name: Download LSP artifacts
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          pattern: lsp-*
          path: lsp-binaries

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Update package.json version
        run: |
          cd editors/vscode
          npm version ${{ steps.version.outputs.version }} --no-git-tag-version --allow-same-version

      - name: Install dependencies
        run: |
          cd editors/vscode
          npm install

      - name: Compile extension
        run: |
          cd editors/vscode
          npx esbuild src/extension.ts --bundle --platform=node --outfile=dist/extension.js --external:vscode --minify

      - name: Copy LSP binary
        run: |
          cd editors/vscode
          mkdir -p bin
          case "${{ matrix.target }}" in
            darwin-arm64) cp ../../lsp-binaries/lsp-macos-arm64/raven-macos-arm64.zip bin/ && cd bin && unzip raven-macos-arm64.zip && rm -f raven-macos-arm64.zip ;;
            darwin-x64) cp ../../lsp-binaries/lsp-macos-x64/raven-macos-x64.zip bin/ && cd bin && unzip raven-macos-x64.zip && rm -f raven-macos-x64.zip ;;
            linux-x64) cp ../../lsp-binaries/lsp-linux-x64/raven-linux-x64.zip bin/ && cd bin && unzip raven-linux-x64.zip && rm -f raven-linux-x64.zip ;;
            linux-arm64) cp ../../lsp-binaries/lsp-linux-arm64/raven-linux-arm64.zip bin/ && cd bin && unzip raven-linux-arm64.zip && rm -f raven-linux-arm64.zip ;;
            win32-x64) cp ../../lsp-binaries/lsp-windows-x64/raven-windows-x64.zip bin/ && cd bin && unzip raven-windows-x64.zip && rm -f raven-windows-x64.zip ;;
            win32-arm64) cp ../../lsp-binaries/lsp-windows-arm64/raven-windows-arm64.zip bin/ && cd bin && unzip raven-windows-arm64.zip && rm -f raven-windows-arm64.zip ;;
            *) echo "ERROR: Unknown target '${{ matrix.target }}'" && exit 1 ;;
          esac

      - name: Package extension
        run: |
          cd editors/vscode
          vsce package --target ${{ matrix.target }}

      - name: Upload extension artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: vscode-${{ matrix.target }}
          path: editors/vscode/*.vsix
          retention-days: 30

  # ── Publish (gated by GitHub Environment approval) ──────────────────
  # After builds complete, these jobs appear as "Waiting for review" in
  # the Actions UI. Approve the "release" environment to create a GitHub
  # Release; approve "marketplace" to publish to VS Code Marketplace and
  # Open VSX.
  #
  # Setup (one-time): Go to repo Settings > Environments and create:
  #   1. "release"      – add yourself as a required reviewer
  #   2. "marketplace"  – add yourself as a required reviewer

  github-release:
    needs: [build-lsp, build-vscode]
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
    steps:
      - name: Download LSP artifacts
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          pattern: lsp-*
          path: lsp-artifacts
          merge-multiple: true

      - name: Download VSIX artifacts
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          pattern: vscode-*
          path: vscode-artifacts
          merge-multiple: true

      - name: List release files
        run: |
          echo "=== LSP binaries ==="
          find lsp-artifacts -type f | sort
          echo "=== VSIX packages ==="
          find vscode-artifacts -type f | sort

      - name: Generate SHA-256 checksums
        run: |
          echo "=== Generating SHA-256 checksums ==="
          for f in $(find lsp-artifacts -name '*.zip' | sort) $(find vscode-artifacts -name '*.vsix' | sort); do
            (cd "$(dirname "$f")" && sha256sum "$(basename "$f")" > "$(basename "$f").sha256")
            cat "$f.sha256"
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          files: |
            lsp-artifacts/**/*.zip
            lsp-artifacts/**/*.zip.sha256
            vscode-artifacts/**/*.vsix
            vscode-artifacts/**/*.vsix.sha256
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-marketplace:
    needs: github-release
    runs-on: ubuntu-latest
    environment: marketplace
    permissions: {}
    steps:
      - name: Download VSIX artifacts
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          pattern: vscode-*
          path: vscode-artifacts
          merge-multiple: true

      - name: Install vsce and ovsx
        run: npm install -g @vscode/vsce@3.7.1 ovsx@0.10.9

      - name: Publish to VS Code Marketplace
        run: |
          for vsix in $(find vscode-artifacts -name '*.vsix' | sort); do
            echo "Publishing $vsix to VS Code Marketplace..."
            vsce publish --packagePath "$vsix"
          done
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Publish to Open VSX
        continue-on-error: true
        run: |
          for vsix in $(find vscode-artifacts -name '*.vsix' | sort); do
            echo "Publishing $vsix to Open VSX..."
            ovsx publish "$vsix"
          done
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
