name: Build names.db (Tier 3 package-export DB)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"   # Mondays 06:00 UTC

permissions:
  contents: write   # to update the names-db Release

env:
  NAMES_DB_BUILDER_REF: names-db-builder

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          ref: ${{ env.NAMES_DB_BUILDER_REF }}
      - uses: r-lib/actions/setup-r@a51a8012b0aab7c32ef9d19bf54da93f3254335e # v2 — reference R; build-shipped-db auto-discovers its .libPaths()

      - name: Build raven (release)
        run: cargo build --release -p raven

      - name: Resolve seed (prefer Release, fall back to committed LFS seed)
        run: |
          mkdir -p seed
          if gh release download names-db --repo "$GITHUB_REPOSITORY" \
               --pattern 'names.db' --dir seed; then
            echo "SEED=seed/names.db" >> "$GITHUB_ENV"
          elif git lfs pull --include=crates/raven/data/names-db-seed.db; then
            echo "SEED=crates/raven/data/names-db-seed.db" >> "$GITHUB_ENV"
          else
            echo "no prior Release and no committed seed; building fresh"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build names.db (reference-R seed ∪ CRAN+Bioc, append-only)
        run: |
          mkdir -p dist
          scripts/build-names-db.sh \
            --raven ./target/release/raven \
            --output dist/names.db \
            ${SEED:+--seed "$SEED"}

      - name: Record checksums
        run: |
          ( cd dist && sha256sum names.db > checksums.sha256 )

      - name: Publish to the names-db Release
        run: |
          gh release create names-db --repo "$GITHUB_REPOSITORY" \
            --title "names.db (Tier 3 package-export DB)" \
            --notes "Auto-updated by build-names-db.yml" 2>/dev/null || true
          gh release upload names-db dist/names.db dist/checksums.sha256 \
            --repo "$GITHUB_REPOSITORY" --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
