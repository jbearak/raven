name: Integration Tests

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  # sccache wraps rustc; unchanged crates are served from ~/.cache/sccache
  # even when Cargo.lock changes. We use the local-filesystem backend (not
  # SCCACHE_GHA_ENABLED) so sccache never does a hard startup probe against
  # the GHA cache API — actions/cache below handles persistence gracefully.
  RUSTC_WRAPPER: sccache
  # mold is a fast linker that significantly reduces link time on Linux.
  RUSTFLAGS: "-C link-arg=-fuse-ld=mold"

permissions:
  contents: read

concurrency:
  group: integration-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Build only the release artifacts that genuinely need optimization: the LSP
  # binary (consumed by the vscode-mocha and binary-size jobs) and the
  # performance_budgets test binary (gated on `not(debug_assertions)`, asserts
  # wall-clock budgets — so it must be optimized). The functional Rust tests are
  # NOT built here; they compile and run in debug in the `cargo` job, which is
  # far cheaper and runs in parallel. This keeps slow release-profile codegen
  # off the large functional test harness, which used to dominate build time.
  build:
    name: Build (release)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@f7ccc83f9ed1e5b9c81d8a67d7ad1a747e22a561 # stable
        with:
          toolchain: stable

      - name: Set up sccache
        uses: mozilla-actions/sccache-action@9e326ebed976843c9932b3aa0e021c6f50310eb4 # v0.0.9

      - name: Cache cargo registry
        id: cargo-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-registry-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-registry-${{ runner.os }}-

      - name: Cache sccache storage
        id: sccache-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/sccache
          key: sccache-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            sccache-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}-
            sccache-${{ runner.os }}-

      - name: Install mold linker
        run: sudo apt-get install -y --no-install-recommends mold

      - name: Reset sccache stats
        run: sccache --zero-stats

      # Build the production LSP binary, then compile (only) the
      # performance_budgets test target in release. Both invocations share a
      # single release compile of the lib (same `--features test-support`), so
      # the second one just links the perf test crate. `--test
      # performance_budgets` deliberately scopes the test build so the large
      # functional integration tests and examples are NOT release-compiled here.
      # cargo prints the compiled test executable's path to stderr; copy it to a
      # stable name for the time-budgets job to download and run.
      - name: Build release LSP binary + perf-budget test binary
        run: |
          cargo build --release -p raven --features test-support
          cargo test --release --no-run -p raven --features test-support \
            --test performance_budgets 2>&1 | tee /tmp/perf-build.txt
          PERF_BIN=$(grep -oE 'target/release/deps/performance_budgets-[a-f0-9]+' /tmp/perf-build.txt | head -1)
          echo "PERF_BIN=$PERF_BIN"
          cp "$PERF_BIN" target/raven-perf-test

      - name: Upload LSP binary
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: raven-release
          path: target/release/raven
          retention-days: 1

      - name: Upload perf-budget test binary
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: raven-perf-test
          path: target/raven-perf-test
          retention-days: 1

      - name: Report cache status
        if: always()
        run: |
          echo "::notice title=Cache status::cargo-hit=${{ steps.cargo-cache.outputs.cache-hit }} sccache-exact-hit=${{ steps.sccache-cache.outputs.cache-hit }}"
          sccache --show-stats

  # Functional Rust tests run in DEBUG: opt-level-0 codegen is far cheaper than
  # release and these tests don't depend on optimization for correctness. This
  # job compiles AND runs them itself (no artifact handoff), so it runs in
  # parallel with the release `build` job instead of waiting on it. `cargo test`
  # here covers the lib unit tests plus every integration test — indentation,
  # libpath_watching, package_db_consumer — which the old single-binary handoff
  # silently dropped. performance_budgets compiles to an empty binary in debug
  # (it is `#![cfg(not(debug_assertions))]`) and is enforced by the
  # time-budgets job instead.
  cargo:
    name: Cargo Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@f7ccc83f9ed1e5b9c81d8a67d7ad1a747e22a561 # stable
        with:
          toolchain: stable

      # sccache + mold are referenced by the workflow-level RUSTC_WRAPPER /
      # RUSTFLAGS env, so every Rust-compiling job must set them up or rustc
      # fails. The debug dep cache is keyed separately from the release one
      # (different opt level → different sccache objects).
      - name: Set up sccache
        uses: mozilla-actions/sccache-action@9e326ebed976843c9932b3aa0e021c6f50310eb4 # v0.0.9

      - name: Cache cargo registry
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-registry-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-registry-${{ runner.os }}-

      - name: Cache sccache storage (debug)
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/sccache
          key: sccache-debug-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            sccache-debug-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}-
            sccache-debug-${{ runner.os }}-

      - name: Install mold linker
        run: sudo apt-get install -y --no-install-recommends mold

      - name: Run cargo tests (debug)
        run: cargo test -p raven --features test-support

  # ── Time-budget regression tests (required check) ──────────────────────
  # Runs the release-compiled performance_budgets binary from the build job.
  # The binary IS the performance_budgets test target, so running it with no
  # filter runs all of its budget tests. Its fixtures are self-generated
  # tempdirs, so no checkout is needed. GitHub Actions sets CI=true, which the
  # tests read to apply their relaxation factor (3×) for slower CI hardware.
  time-budgets:
    name: Time-Budget Tests
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Download perf-budget test binary
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.2.1
        with:
          name: raven-perf-test
          path: target/

      - name: Run time-budget tests
        run: |
          chmod +x target/raven-perf-test
          target/raven-perf-test

  # ── Release binary size tracking ───────────────────────────────────────
  binary-size:
    name: Binary Size
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download LSP binary
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.2.1
        with:
          name: raven-release
          path: target/release/

      - name: Display binary size
        run: |
          {
            echo "## Release Binary Size"
            echo '```'
            ls -lh target/release/raven
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          ls -la target/release/raven

  # ── VS Code Mocha integration suite ────────────────────────────────────
  vscode-mocha:
    name: VS Code Mocha Suite
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Download LSP binary
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.2.1
        with:
          name: raven-release
          path: target/release/

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: editors/vscode/package-lock.json

      - name: Install Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      # Fail fast on drift between `editors/vscode/package.json` (single
      # source of truth for `raven.*` settings) and the generated
      # `docs/settings-reference.md`. Cheap to run and independent of the
      # rest of this job, so it catches doc-only PRs that miss the
      # regeneration step before the heavier Electron build kicks off.
      - name: Check settings reference is up to date
        run: bun editors/vscode/scripts/generate-settings-reference.mjs --check

      # Electron (the runtime VS Code uses for integration tests) needs an
      # X server plus a handful of native libs that aren't in the default
      # `ubuntu-latest` image. The `*t64` package names target Ubuntu 24.04
      # (current `ubuntu-latest`); they Provide the legacy names so this
      # block also works if the image rolls back to 22.04.
      #
      # R goes alongside so suites that drive the live R session (help,
      # send-to-r, future knit / rmarkdown coverage) can run instead of
      # skipping. `r-base-core` is the minimal install; tests that need
      # specific packages (e.g. `arrow` for the data-viewer suite) still
      # skip themselves when those packages aren't installed.
      #
      # `r-cran-plyr` is needed by the cross-file LSP test
      # (`lsp.test.ts: cross-file: sibling package propagation …`): the
      # LSP's libpath scan must know `plyr` exports `ddply` before it can
      # suppress the undefined-variable diagnostic that the test asserts
      # against. Other widely-used CRAN packages can be added here as
      # the suite grows.
      - name: Install Xvfb, Electron runtime deps, and R
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            xvfb \
            libnss3 \
            libatk-bridge2.0-0t64 \
            libatk1.0-0t64 \
            libgtk-3-0t64 \
            libasound2t64 \
            libdrm2 \
            libxkbcommon-x11-0 \
            libgbm1 \
            libsecret-1-0 \
            xdg-utils \
            r-base-core \
            r-cran-plyr

      # The extension uses `package-lock.json` (no `bun.lockb`), so `npm ci`
      # gives us a reproducible install. The test scripts themselves still
      # run under Bun (matching the local `bun run test` invocation used by
      # `tests/bun/workspace-suite.test.ts`).
      - name: Install VS Code extension dependencies
        working-directory: editors/vscode
        run: npm ci

      # `vscode-test` downloads a VS Code build (~150 MB) on first run.
      # Caching it on the .vscode-test.mjs hash keeps PR feedback fast and
      # invalidates the cache when the pinned VS Code version changes.
      - name: Cache VS Code download
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: editors/vscode/.vscode-test
          key: vscode-test-${{ runner.os }}-${{ hashFiles('editors/vscode/.vscode-test.mjs') }}
          restore-keys: |
            vscode-test-${{ runner.os }}-

      # `vscode:prepublish` runs `bundle` (esbuild → `dist/extension.js`, the
      # extension's `main` entry) and `copy-binary` (places the LSP binary at
      # `bin/raven`). Both must exist before `vscode-test` activates the
      # extension; `pretest` (below) only handles the test-side `tsc` build.
      - name: Bundle extension and place LSP binary
        working-directory: editors/vscode
        run: |
          chmod +x "$GITHUB_WORKSPACE/target/release/raven"
          bun run vscode:prepublish

      - name: Compile tests
        working-directory: editors/vscode
        run: bun run pretest

      - name: Run integration tests under Xvfb
        working-directory: editors/vscode
        run: xvfb-run -a bun run test
