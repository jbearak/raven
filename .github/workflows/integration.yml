name: Integration Tests

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  # sccache wraps rustc; unchanged crates are served from ~/.cache/sccache
  # even when Cargo.lock changes. We use the local-filesystem backend (not
  # SCCACHE_GHA_ENABLED) so sccache never does a hard startup probe against
  # the GHA cache API — actions/cache below handles persistence gracefully.
  RUSTC_WRAPPER: sccache
  # mold is a fast linker that significantly reduces link time on Linux.
  RUSTFLAGS: "-C link-arg=-fuse-ld=mold"

permissions:
  contents: read

concurrency:
  group: integration-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Compile all Rust artifacts once in release profile and upload them.
  # All downstream jobs download what they need — no second compile.
  # Release profile is required so that performance_budgets tests
  # (gated on `not(debug_assertions)`) are included and enforced.
  build:
    name: Build (release)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set up sccache
        uses: mozilla-actions/sccache-action@9e326ebed976843c9932b3aa0e021c6f50310eb4 # v0.0.9

      - name: Cache sccache storage and cargo registry
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cache/sccache
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-sccache-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-sccache-${{ runner.os }}-

      - name: Install mold linker
        run: sudo apt-get install -y --no-install-recommends mold

      # `cargo test --release --no-run` compiles the test binary (all tests,
      # including performance_budgets) without running it. The path to the
      # compiled executable is printed to stderr; we copy it to a stable name.
      # The same binary serves both the cargo and time-budgets jobs (filtered
      # by passing a test name prefix to the executable).
      - name: Compile release test + LSP binaries
        run: |
          cargo test --release --no-run -p raven --features test-support 2>&1 | tee /tmp/cargo-test-build.txt
          TEST_BIN=$(grep -oE 'target/release/deps/raven-[a-f0-9]+' /tmp/cargo-test-build.txt | head -1)
          echo "TEST_BIN=$TEST_BIN"
          cp "$TEST_BIN" target/raven-test

      # cargo bench --no-run compiles the bench binary without running it.
      # We use the same grep strategy to find and rename it.
      - name: Compile release bench binary
        run: |
          cargo bench --no-run -p raven --features test-support --bench startup 2>&1 | tee /tmp/cargo-bench-build.txt
          BENCH_BIN=$(grep -oE 'target/release/deps/startup-[a-f0-9]+' /tmp/cargo-bench-build.txt | head -1)
          echo "BENCH_BIN=$BENCH_BIN"
          cp "$BENCH_BIN" target/raven-bench

      - name: Upload LSP binary
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: raven-release
          path: target/release/raven
          retention-days: 1

      - name: Upload test binary
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: raven-test
          path: target/raven-test
          retention-days: 1

      - name: Upload bench binary
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: raven-bench
          path: target/raven-bench
          retention-days: 1

  # Run the full Rust test suite using the pre-compiled release binary.
  cargo:
    name: Cargo Tests
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Download test binary
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.2.1
        with:
          name: raven-test
          path: target/

      - name: Run cargo tests (release)
        run: |
          chmod +x target/raven-test
          target/raven-test

  # ── Time-budget regression tests (required check) ──────────────────────
  # Re-uses the test binary from the build job, filtered to performance_budgets.
  time-budgets:
    name: Time-Budget Tests
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Download test binary
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.2.1
        with:
          name: raven-test
          path: target/

      - name: Run time-budget tests
        run: |
          chmod +x target/raven-test
          target/raven-test performance_budgets

  # ── Criterion benchmarks with baseline management ──────────────────────
  benchmarks:
    name: Criterion Benchmarks
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Download bench binary
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.2.1
        with:
          name: raven-bench
          path: target/

      # Criterion baselines are stored under target/criterion/.
      # We cache them so PR runs can compare against the main baseline.
      - name: Restore Criterion baseline cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: target/criterion
          key: criterion-baseline-${{ runner.os }}-main-${{ github.run_id }}
          restore-keys: |
            criterion-baseline-${{ runner.os }}-

      - name: Install critcmp
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        id: critcmp-cache
        with:
          path: ~/.cargo/bin/critcmp
          key: critcmp-${{ runner.os }}-v0.1

      # critcmp itself is a small binary; only build if not cached.
      # We still need the Rust toolchain for this install step.
      - name: Install Rust toolchain (for critcmp install only)
        if: steps.critcmp-cache.outputs.cache-hit != 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Build critcmp
        if: steps.critcmp-cache.outputs.cache-hit != 'true'
        run: cargo install critcmp

      # Criterion writes output to ./target/criterion/ relative to CWD.
      # Create the directory so the bench binary can write its baseline.
      # On push to main: save results as the new baseline.
      # On PRs: compare against the main baseline.
      - name: Run benchmarks (push to main — save baseline)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          mkdir -p target/criterion
          chmod +x target/raven-bench
          target/raven-bench --bench -- --save-baseline main

      - name: Run benchmarks (PR — compare against main)
        if: github.event_name == 'pull_request'
        run: |
          mkdir -p target/criterion
          chmod +x target/raven-bench
          target/raven-bench --bench -- --save-baseline pr

      # ── PR regression comment via critcmp ────────────────────────────────
      - name: Compare benchmarks against main baseline
        if: github.event_name == 'pull_request'
        id: critcmp
        run: |
          # If the main baseline doesn't exist, skip comparison
          if ! critcmp --list 2>/dev/null | grep -q '^main$'; then
            echo "No main baseline found — skipping comparison."
            echo "has_diff=false" >> "$GITHUB_OUTPUT"
            echo "no_baseline=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "no_baseline=false" >> "$GITHUB_OUTPUT"
          # Compare PR results against main baseline, threshold 5%
          if critcmp main pr --threshold 5 > /tmp/critcmp-output.txt 2>&1; then
            if [ -s /tmp/critcmp-output.txt ]; then
              echo "has_diff=true" >> "$GITHUB_OUTPUT"
            else
              echo "has_diff=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "::warning::critcmp failed; treating as diff to surface in PR comment"
            echo "has_diff=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Post or update PR comment
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          MARKER="<!-- raven-benchmark-comparison -->"
          BODY_FILE=$(mktemp)
          trap 'rm -f "$BODY_FILE"' EXIT

          if [ "${{ steps.critcmp.outputs.no_baseline }}" = "true" ]; then
            cat > "$BODY_FILE" <<'ENDOFBODY'
          <!-- raven-benchmark-comparison -->
          ## Benchmark Comparison

          No `main` baseline found — benchmark comparison skipped.

          A baseline will be created when this branch (or a future PR) is merged to `main`.
          ENDOFBODY
          elif [ "${{ steps.critcmp.outputs.has_diff }}" = "true" ]; then
            {
              cat <<'ENDOFBODY'
          <!-- raven-benchmark-comparison -->
          ## Benchmark Comparison

          Showing benchmarks with **>5% change** vs `main`:

          ```
          ENDOFBODY
              cat /tmp/critcmp-output.txt
              cat <<'ENDOFBODY'
          ```

          _Generated by `critcmp --threshold 5`. Criterion baselines compared: `main` → `pr`._
          ENDOFBODY
            } > "$BODY_FILE"
          else
            cat > "$BODY_FILE" <<'ENDOFBODY'
          <!-- raven-benchmark-comparison -->
          ## Benchmark Comparison

          No benchmarks changed by more than 5% vs `main`.

          _Generated by `critcmp --threshold 5`._
          ENDOFBODY
          fi

          EXISTING_COMMENT_ID=$(gh api \
            "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
            --paginate -q ".[] | select(.body | contains(\"${MARKER}\")) | .id" \
            | head -1)

          if [ -n "$EXISTING_COMMENT_ID" ]; then
            jq -Rs '{"body": .}' < "$BODY_FILE" | \
              gh api \
                "repos/${{ github.repository }}/issues/comments/${EXISTING_COMMENT_ID}" \
                -X PATCH --input -
          else
            gh pr comment "${PR_NUMBER}" --body-file "$BODY_FILE"
          fi

  # ── Release binary size tracking ───────────────────────────────────────
  binary-size:
    name: Binary Size
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download LSP binary
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.2.1
        with:
          name: raven-release
          path: target/release/

      - name: Display binary size
        run: |
          echo "## Release Binary Size" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          ls -lh target/release/raven >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          ls -la target/release/raven

  # ── VS Code Mocha integration suite ────────────────────────────────────
  vscode-mocha:
    name: VS Code Mocha Suite
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Download LSP binary
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.2.1
        with:
          name: raven-release
          path: target/release/

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: editors/vscode/package-lock.json

      - name: Install Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      # Fail fast on drift between `editors/vscode/package.json` (single
      # source of truth for `raven.*` settings) and the generated
      # `docs/settings-reference.md`. Cheap to run and independent of the
      # rest of this job, so it catches doc-only PRs that miss the
      # regeneration step before the heavier Electron build kicks off.
      - name: Check settings reference is up to date
        run: bun editors/vscode/scripts/generate-settings-reference.mjs --check

      # Electron (the runtime VS Code uses for integration tests) needs an
      # X server plus a handful of native libs that aren't in the default
      # `ubuntu-latest` image. The `*t64` package names target Ubuntu 24.04
      # (current `ubuntu-latest`); they Provide the legacy names so this
      # block also works if the image rolls back to 22.04.
      #
      # R goes alongside so suites that drive the live R session (help,
      # send-to-r, future knit / rmarkdown coverage) can run instead of
      # skipping. `r-base-core` is the minimal install; tests that need
      # specific packages (e.g. `arrow` for the data-viewer suite) still
      # skip themselves when those packages aren't installed.
      #
      # `r-cran-plyr` is needed by the cross-file LSP test
      # (`lsp.test.ts: cross-file: sibling package propagation …`): the
      # LSP's libpath scan must know `plyr` exports `ddply` before it can
      # suppress the undefined-variable diagnostic that the test asserts
      # against. Other widely-used CRAN packages can be added here as
      # the suite grows.
      - name: Install Xvfb, Electron runtime deps, and R
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            xvfb \
            libnss3 \
            libatk-bridge2.0-0t64 \
            libatk1.0-0t64 \
            libgtk-3-0t64 \
            libasound2t64 \
            libdrm2 \
            libxkbcommon-x11-0 \
            libgbm1 \
            libsecret-1-0 \
            xdg-utils \
            r-base-core \
            r-cran-plyr

      # The extension uses `package-lock.json` (no `bun.lockb`), so `npm ci`
      # gives us a reproducible install. The test scripts themselves still
      # run under Bun (matching the local `bun run test` invocation used by
      # `tests/bun/workspace-suite.test.ts`).
      - name: Install VS Code extension dependencies
        working-directory: editors/vscode
        run: npm ci

      # `vscode-test` downloads a VS Code build (~150 MB) on first run.
      # Caching it on the .vscode-test.mjs hash keeps PR feedback fast and
      # invalidates the cache when the pinned VS Code version changes.
      - name: Cache VS Code download
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: editors/vscode/.vscode-test
          key: vscode-test-${{ runner.os }}-${{ hashFiles('editors/vscode/.vscode-test.mjs') }}
          restore-keys: |
            vscode-test-${{ runner.os }}-

      # `vscode:prepublish` runs `bundle` (esbuild → `dist/extension.js`, the
      # extension's `main` entry) and `copy-binary` (places the LSP binary at
      # `bin/raven`). Both must exist before `vscode-test` activates the
      # extension; `pretest` (below) only handles the test-side `tsc` build.
      - name: Bundle extension and place LSP binary
        working-directory: editors/vscode
        run: |
          chmod +x "$GITHUB_WORKSPACE/target/release/raven"
          bun run vscode:prepublish

      - name: Compile tests
        working-directory: editors/vscode
        run: bun run pretest

      - name: Run integration tests under Xvfb
        working-directory: editors/vscode
        run: xvfb-run -a bun run test
