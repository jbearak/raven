name: Integration Tests

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  # sccache wraps rustc; unchanged crates are served from ~/.cache/sccache
  # even when Cargo.lock changes. We use the local-filesystem backend (not
  # SCCACHE_GHA_ENABLED) so sccache never does a hard startup probe against
  # the GHA cache API â€” actions/cache below handles persistence gracefully.
  RUSTC_WRAPPER: sccache
  # mold is a fast linker that significantly reduces link time on Linux.
  RUSTFLAGS: "-C link-arg=-fuse-ld=mold"

permissions:
  contents: read

concurrency:
  group: integration-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Compile all Rust artifacts once in release profile and upload them.
  # Both downstream jobs download what they need â€” no second compile.
  # Release profile is required so that performance_budgets tests
  # (gated on `not(debug_assertions)`) are included and enforced.
  build:
    name: Build (release)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set up sccache
        uses: mozilla-actions/sccache-action@9e326ebed976843c9932b3aa0e021c6f50310eb4 # v0.0.9

      - name: Cache sccache storage and cargo registry
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cache/sccache
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-sccache-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-sccache-${{ runner.os }}-

      - name: Install mold linker
        run: sudo apt-get install -y --no-install-recommends mold

      # Compile test binary without running it. `--features test-support`
      # exposes `raven::test_utils` needed by `performance_budgets`.
      # The cargo test output prints the path to the compiled executable;
      # we capture it and copy to a stable name alongside the LSP binary.
      - name: Compile (release)
        run: |
          cargo test --release --no-run -p raven --features test-support 2>&1 | tee /tmp/cargo-test-build.txt
          TEST_BIN=$(grep -oE 'target/release/deps/raven-[a-f0-9]+' /tmp/cargo-test-build.txt | head -1)
          echo "TEST_BIN=$TEST_BIN"
          cp "$TEST_BIN" target/raven-test

      - name: Upload LSP binary
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: raven-release
          path: target/release/raven
          retention-days: 1

      - name: Upload test binary
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: raven-test
          path: target/raven-test
          retention-days: 1

  # Run the Rust test suite using the pre-compiled release binary.
  # Runs in parallel with the build job is not possible (needs: build),
  # but the download-and-run step is ~30s vs ~10min compile.
  cargo:
    name: Cargo Tests
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Download test binary
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.2.1
        with:
          name: raven-test
          path: target/

      - name: Run cargo tests (release)
        run: |
          chmod +x target/raven-test
          target/raven-test

  # Run the VS Code Mocha integration suite using the pre-compiled LSP binary.
  vscode-mocha:
    name: VS Code Mocha Suite
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Download LSP binary
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.2.1
        with:
          name: raven-release
          path: target/release/

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: editors/vscode/package-lock.json

      - name: Install Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      # Fail fast on drift between `editors/vscode/package.json` (single
      # source of truth for `raven.*` settings) and the generated
      # `docs/settings-reference.md`. Cheap to run and independent of the
      # rest of this job, so it catches doc-only PRs that miss the
      # regeneration step before the heavier Electron build kicks off.
      - name: Check settings reference is up to date
        run: bun editors/vscode/scripts/generate-settings-reference.mjs --check

      # Electron (the runtime VS Code uses for integration tests) needs an
      # X server plus a handful of native libs that aren't in the default
      # `ubuntu-latest` image. The `*t64` package names target Ubuntu 24.04
      # (current `ubuntu-latest`); they Provide the legacy names so this
      # block also works if the image rolls back to 22.04.
      #
      # R goes alongside so suites that drive the live R session (help,
      # send-to-r, future knit / rmarkdown coverage) can run instead of
      # skipping. `r-base-core` is the minimal install; tests that need
      # specific packages (e.g. `arrow` for the data-viewer suite) still
      # skip themselves when those packages aren't installed.
      #
      # `r-cran-plyr` is needed by the cross-file LSP test
      # (`lsp.test.ts: cross-file: sibling package propagation â€¦`): the
      # LSP's libpath scan must know `plyr` exports `ddply` before it can
      # suppress the undefined-variable diagnostic that the test asserts
      # against. Other widely-used CRAN packages can be added here as
      # the suite grows.
      - name: Install Xvfb, Electron runtime deps, and R
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            xvfb \
            libnss3 \
            libatk-bridge2.0-0t64 \
            libatk1.0-0t64 \
            libgtk-3-0t64 \
            libasound2t64 \
            libdrm2 \
            libxkbcommon-x11-0 \
            libgbm1 \
            libsecret-1-0 \
            xdg-utils \
            r-base-core \
            r-cran-plyr

      # The extension uses `package-lock.json` (no `bun.lockb`), so `npm ci`
      # gives us a reproducible install. The test scripts themselves still
      # run under Bun (matching the local `bun run test` invocation used by
      # `tests/bun/workspace-suite.test.ts`).
      - name: Install VS Code extension dependencies
        working-directory: editors/vscode
        run: npm ci

      # `vscode-test` downloads a VS Code build (~150 MB) on first run.
      # Caching it on the .vscode-test.mjs hash keeps PR feedback fast and
      # invalidates the cache when the pinned VS Code version changes.
      - name: Cache VS Code download
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: editors/vscode/.vscode-test
          key: vscode-test-${{ runner.os }}-${{ hashFiles('editors/vscode/.vscode-test.mjs') }}
          restore-keys: |
            vscode-test-${{ runner.os }}-

      # `vscode:prepublish` runs `bundle` (esbuild â†’ `dist/extension.js`, the
      # extension's `main` entry) and `copy-binary` (places the LSP binary at
      # `bin/raven`). Both must exist before `vscode-test` activates the
      # extension; `pretest` (below) only handles the test-side `tsc` build.
      - name: Bundle extension and place LSP binary
        working-directory: editors/vscode
        run: |
          chmod +x "$GITHUB_WORKSPACE/target/release/raven"
          bun run vscode:prepublish

      - name: Compile tests
        working-directory: editors/vscode
        run: bun run pretest

      - name: Run integration tests under Xvfb
        working-directory: editors/vscode
        run: xvfb-run -a bun run test
