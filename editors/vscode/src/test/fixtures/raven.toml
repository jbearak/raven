# This raven.toml enables linting for the test workspace (src/test/fixtures/).
# It applies to ALL .R files in this directory tree. Tests that assert exact
# diagnostic counts should filter by source (e.g., d.source !== 'raven (lint)')
# to avoid coupling to lint output.
[linting]
enabled = true
lineLengthSeverity = "warning"
trailingWhitespaceSeverity = "warning"
assignmentOperatorSeverity = "warning"
objectNameSeverity = "warning"
tAndFSymbolSeverity = "warning"
infixSpacesSeverity = "warning"
